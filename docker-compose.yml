services:
  db:
    image: postgres:15-alpine
    container_name: job-tracker-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job-tracker-backend
    restart: always
    command: npm run start:dev
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/job_tracker?schema=public"
      PORT: 3333
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3333"
    container_name: job-tracker-frontend
    restart: always
    command: npm run dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/next.config.ts:/app/next.config.ts
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
